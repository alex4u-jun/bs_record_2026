<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CSIA · Leaders — 2026 기록실</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Saira+Condensed:wght@500;600;700&family=Saira:wght@400;500;600;700&family=Archivo+Black&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ============================================================
   2026 RECORD ROOM — broadcast / scoreboard aesthetic
   ============================================================ */
:root{
  --bg:#070b14;
  --bg2:#0b1220;
  --panel:#0f1729;
  --panel2:#121d33;
  --line:#1d2c4a;
  --line2:#273a5e;
  --text:#e8eef9;
  --muted:#8497b8;
  --dim:#5b6d8e;

  --csia:#ff5a3c;          /* CSIA = 붉은 네온 */
  --csia-glow:rgba(255,90,60,.45);
  --leaders:#27d0ff;       /* Leaders = 시안 네온 */
  --leaders-glow:rgba(39,208,255,.45);

  --accent:#ffd23f;        /* 전광판 노랑 */
  --accent2:#5effb0;
  --good:#34e0a1;
  --bad:#ff647c;

  --radius:16px;
  --shadow:0 18px 50px rgba(0,0,0,.55);
  --shadow-sm:0 6px 18px rgba(0,0,0,.4);

  --mono:'Saira Condensed', system-ui, sans-serif;
  --display:'Bebas Neue', system-ui, sans-serif;
  --body:'Saira', system-ui, -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}

*{ box-sizing:border-box; }
html,body{ margin:0; padding:0; }
body{
  font-family:var(--body);
  background:
    radial-gradient(1200px 600px at 15% -10%, rgba(39,208,255,.10), transparent 60%),
    radial-gradient(1000px 500px at 90% 0%, rgba(255,90,60,.10), transparent 55%),
    linear-gradient(180deg, var(--bg) 0%, var(--bg2) 100%);
  background-attachment:fixed;
  color:var(--text);
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
/* 미세한 그레인/스캔라인 텍스처 */
body::before{
  content:"";
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background-image:repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}
.wrap{ position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:28px 20px 80px; }

a{ color:inherit; text-decoration:none; }
::selection{ background:var(--accent); color:#111; }

/* ---------- HEADER ---------- */
header.top{
  display:flex; align-items:center; justify-content:space-between;
  gap:16px; flex-wrap:wrap; margin-bottom:26px;
}
.brand{ display:flex; align-items:center; gap:16px; }
.brand .logo{
  width:54px; height:54px; border-radius:14px;
  background:linear-gradient(145deg, var(--csia) 0%, var(--csia) 49%, var(--leaders) 51%, var(--leaders) 100%);
  position:relative; box-shadow:0 0 22px rgba(39,208,255,.35), 0 0 22px rgba(255,90,60,.25);
  flex:0 0 auto;
}
.brand .logo::after{
  content:"⚾"; position:absolute; inset:0; display:grid; place-items:center;
  font-size:24px; filter:drop-shadow(0 2px 4px rgba(0,0,0,.6));
}
.brand h1{
  font-family:var(--display); font-weight:400; letter-spacing:1.5px;
  font-size:clamp(26px,4.5vw,40px); margin:0; line-height:.95;
}
.brand h1 .c{ color:var(--csia); text-shadow:0 0 18px var(--csia-glow); }
.brand h1 .l{ color:var(--leaders); text-shadow:0 0 18px var(--leaders-glow); }
.brand .sub{ font-family:var(--mono); color:var(--muted); font-size:13px; letter-spacing:3px; text-transform:uppercase; }

.season-pill{
  font-family:var(--mono); font-weight:700; letter-spacing:1px;
  border:1px solid var(--line2); background:rgba(255,210,63,.08);
  color:var(--accent); padding:8px 16px; border-radius:999px; font-size:15px;
  box-shadow:inset 0 0 12px rgba(255,210,63,.08);
}

/* ---------- NAV TABS ---------- */
nav.tabs{
  display:flex; gap:6px; margin-bottom:26px; flex-wrap:wrap;
  background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:6px;
  box-shadow:var(--shadow-sm);
}
nav.tabs button{
  flex:1 1 auto; min-width:96px;
  font-family:var(--mono); font-weight:600; font-size:15px; letter-spacing:.5px;
  background:transparent; color:var(--muted); border:none; cursor:pointer;
  padding:11px 14px; border-radius:9px; transition:all .18s ease; white-space:nowrap;
}
nav.tabs button:hover{ color:var(--text); background:var(--panel2); }
nav.tabs button.active{
  color:#071018; background:linear-gradient(180deg,#fff,#d7e6ff);
  box-shadow:0 4px 14px rgba(120,180,255,.25);
}

/* ---------- SECTION ---------- */
section.view{ display:none; animation:fade .35s ease; }
section.view.active{ display:block; }
@keyframes fade{ from{opacity:0; transform:translateY(8px);} to{opacity:1; transform:none;} }

.section-title{
  font-family:var(--display); font-weight:400; letter-spacing:1px;
  font-size:24px; margin:6px 0 18px; color:var(--text);
  display:flex; align-items:center; gap:12px;
}
.section-title::before{
  content:""; width:5px; height:24px; border-radius:3px;
  background:linear-gradient(180deg,var(--accent),var(--csia));
}

/* ---------- CARD / PANEL ---------- */
.panel{
  background:linear-gradient(180deg, var(--panel) 0%, var(--bg2) 100%);
  border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:18px 18px;
}
.grid{ display:grid; gap:16px; }

/* ---------- SCOREBOARD (게임 카드) ---------- */
.games-grid{ grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); }
.game-card{
  background:linear-gradient(165deg, var(--panel2) 0%, var(--panel) 100%);
  border:1px solid var(--line); border-radius:14px; overflow:hidden;
  cursor:pointer; transition:transform .16s ease, border-color .16s ease, box-shadow .16s ease;
  position:relative;
}
.game-card:hover{ transform:translateY(-3px); border-color:var(--line2); box-shadow:0 16px 36px rgba(0,0,0,.5); }
.game-card .gc-date{
  font-family:var(--mono); font-size:12.5px; letter-spacing:2px; color:var(--dim);
  padding:12px 16px 0; text-transform:uppercase;
}
.gc-score{ display:flex; align-items:stretch; padding:8px 16px 14px; gap:10px; }
.gc-team{ flex:1; display:flex; flex-direction:column; gap:3px; }
.gc-team .tn{ font-family:var(--mono); font-weight:700; font-size:15px; letter-spacing:.5px; }
.gc-team .tn.csia{ color:var(--csia); } .gc-team .tn.leaders{ color:var(--leaders); }
.gc-team .rn{ font-family:var(--display); font-size:46px; line-height:.85; }
.gc-vs{ align-self:center; font-family:var(--mono); color:var(--dim); font-size:13px; padding:0 4px; }
.gc-team.win .rn{ color:var(--accent); text-shadow:0 0 16px rgba(255,210,63,.4); }
.gc-foot{
  border-top:1px solid var(--line); padding:9px 16px;
  font-family:var(--mono); font-size:12px; color:var(--muted); letter-spacing:.5px;
  display:flex; justify-content:space-between; align-items:center;
}
.gc-foot .tag{ color:var(--accent2); }
.gc-arrow{ color:var(--dim); transition:transform .16s ease; }
.game-card:hover .gc-arrow{ transform:translateX(4px); color:var(--text); }

/* ---------- TABLE ---------- */
.table-scroll{ overflow-x:auto; border-radius:12px; }
table.rec{ width:100%; border-collapse:collapse; min-width:520px; }
table.rec th, table.rec td{
  padding:10px 12px; text-align:center; font-size:14px; white-space:nowrap;
  border-bottom:1px solid var(--line);
}
table.rec th{
  font-family:var(--mono); font-weight:600; letter-spacing:1px; text-transform:uppercase;
  color:var(--muted); font-size:12px; background:var(--panel2);
  position:sticky; top:0; cursor:pointer; user-select:none;
}
table.rec th:hover{ color:var(--accent); }
table.rec th.sorted::after{ content:" ▾"; color:var(--accent); }
table.rec th.sorted.asc::after{ content:" ▴"; }
table.rec td.name{ text-align:left; font-weight:600; cursor:pointer; }
table.rec td.name:hover{ color:var(--accent); }
table.rec tbody tr{ transition:background .12s ease; }
table.rec tbody tr:hover{ background:rgba(39,208,255,.05); }
table.rec td.rank{ font-family:var(--display); font-size:20px; color:var(--dim); width:42px; }
table.rec tr:nth-child(1) td.rank{ color:var(--accent); }
table.rec td .teamdot{ display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; vertical-align:middle; }
.teamdot.csia{ background:var(--csia); box-shadow:0 0 8px var(--csia-glow);} .teamdot.leaders{ background:var(--leaders); box-shadow:0 0 8px var(--leaders-glow);}
td.hi{ color:var(--accent); font-weight:700; }

/* ---------- STAT CHIPS ---------- */
.chips{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.chip{
  font-family:var(--mono); font-weight:600; font-size:13.5px; letter-spacing:.5px;
  padding:8px 15px; border-radius:999px; cursor:pointer;
  background:var(--panel); border:1px solid var(--line); color:var(--muted);
  transition:all .15s ease;
}
.chip:hover{ color:var(--text); border-color:var(--line2); }
.chip.active{ background:var(--accent); color:#111; border-color:var(--accent); box-shadow:0 0 16px rgba(255,210,63,.3); }
.toolbar{ display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:14px; }
.search{
  flex:1; min-width:180px;
  background:var(--panel); border:1px solid var(--line); border-radius:10px;
  color:var(--text); font-family:var(--body); font-size:15px; padding:11px 14px;
}
.search:focus{ outline:none; border-color:var(--leaders); box-shadow:0 0 0 3px var(--leaders-glow); }
.search::placeholder{ color:var(--dim); }
.seg{ display:flex; background:var(--panel); border:1px solid var(--line); border-radius:10px; overflow:hidden; }
.seg button{ font-family:var(--mono); font-weight:600; font-size:14px; padding:10px 18px; background:transparent; color:var(--muted); border:none; cursor:pointer; }
.seg button.active{ background:var(--panel2); color:var(--text); }

/* ---------- KPI ROW ---------- */
.kpi-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:12px; margin-bottom:20px; }
.kpi{ background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:14px 16px; }
.kpi .k{ font-family:var(--mono); font-size:11.5px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); }
.kpi .v{ font-family:var(--display); font-size:34px; line-height:1; margin-top:4px; color:var(--text); }
.kpi .v.accent{ color:var(--accent); }

/* ---------- MVP ---------- */
.mvp-banner{
  background:linear-gradient(110deg, rgba(255,210,63,.14), rgba(255,90,60,.08) 60%, transparent);
  border:1px solid var(--line2); border-radius:var(--radius); padding:22px 24px;
  display:flex; align-items:center; gap:20px; margin-bottom:22px; position:relative; overflow:hidden;
}
.mvp-banner::before{ content:"MVP"; position:absolute; right:-6px; top:-24px; font-family:var(--display); font-size:120px; color:rgba(255,210,63,.06); }
.mvp-trophy{ font-size:46px; filter:drop-shadow(0 0 14px rgba(255,210,63,.5)); }
.mvp-info .lbl{ font-family:var(--mono); letter-spacing:2px; font-size:12px; color:var(--accent); text-transform:uppercase; }
.mvp-info .nm{ font-family:var(--display); font-size:32px; line-height:1; margin-top:2px; }
.mvp-info .meta{ color:var(--muted); font-size:14px; margin-top:4px; }

/* ---------- PLAYER DETAIL (modal-ish panel) ---------- */
.detail-head{ display:flex; align-items:flex-end; gap:16px; flex-wrap:wrap; margin-bottom:6px; }
.detail-head .num{ font-family:var(--display); font-size:58px; line-height:.8; color:var(--line2); }
.detail-head .nm{ font-family:var(--display); font-size:40px; line-height:.9; }
.detail-head .pos{ font-family:var(--mono); color:var(--muted); letter-spacing:1px; font-size:14px; padding-bottom:6px; }
.back-btn{
  font-family:var(--mono); font-weight:600; letter-spacing:.5px; font-size:14px;
  background:var(--panel); border:1px solid var(--line); color:var(--muted);
  padding:9px 16px; border-radius:10px; cursor:pointer; margin-bottom:16px; transition:all .15s ease;
}
.back-btn:hover{ color:var(--text); border-color:var(--line2); }
.chart-box{ background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:16px 16px 8px; margin-top:16px; }
.chart-box h4{ font-family:var(--mono); letter-spacing:1px; font-size:13px; text-transform:uppercase; color:var(--muted); margin:0 0 10px; }
.chart-canvas-wrap{ position:relative; height:280px; }

/* ---------- GAME DETAIL ---------- */
.gd-scoreboard{
  background:linear-gradient(180deg,#0a1220,#0d1830);
  border:1px solid var(--line2); border-radius:16px; padding:20px; margin-bottom:22px;
  box-shadow:inset 0 0 30px rgba(0,0,0,.4);
}
.gd-line-table{ width:100%; border-collapse:collapse; font-family:var(--mono); }
.gd-line-table th, .gd-line-table td{ padding:8px 10px; text-align:center; font-size:15px; }
.gd-line-table th{ color:var(--dim); font-size:12px; letter-spacing:1px; border-bottom:1px solid var(--line); }
.gd-line-table td.tcell{ text-align:left; font-weight:700; font-size:16px; }
.gd-line-table td.total{ font-family:var(--display); font-size:26px; color:var(--accent); }
.gd-line-table tr.csia td.tcell{ color:var(--csia); } .gd-line-table tr.leaders td.tcell{ color:var(--leaders); }
.ab-log{ margin-top:8px; }
.ab-inning{ margin-bottom:14px; }
.ab-inning .ih{ font-family:var(--mono); letter-spacing:1px; font-size:13px; color:var(--accent2); margin:14px 0 8px; border-bottom:1px dashed var(--line); padding-bottom:6px; }
.ab-row{ display:flex; align-items:center; gap:10px; padding:7px 10px; border-radius:9px; font-size:14px; }
.ab-row:nth-child(even){ background:rgba(255,255,255,.018); }
.ab-row .bd{ font-family:var(--mono); font-size:12px; color:var(--dim); width:34px; }
.ab-row .htr{ font-weight:600; min-width:64px; }
.ab-row .arrow{ color:var(--dim); }
.ab-row .res{ font-family:var(--mono); font-weight:600; }
.res.hit{ color:var(--good); } .res.out{ color:var(--muted); } .res.walk{ color:var(--leaders); } .res.hr{ color:var(--accent); } .res.err{ color:var(--bad); }
.ab-row .rbi{ font-size:12px; color:var(--accent); font-family:var(--mono); }

/* ---------- misc ---------- */
.loading,.empty{ text-align:center; color:var(--dim); font-family:var(--mono); letter-spacing:1px; padding:60px 20px; }
.spinner{ width:34px; height:34px; border:3px solid var(--line); border-top-color:var(--accent); border-radius:50%; margin:0 auto 16px; animation:spin .8s linear infinite; }
@keyframes spin{ to{ transform:rotate(360deg); } }
footer{ text-align:center; color:var(--dim); font-family:var(--mono); font-size:12px; letter-spacing:1px; margin-top:50px; padding-top:24px; border-top:1px solid var(--line); }

@media (max-width:600px){
  .wrap{ padding:18px 14px 60px; }
  .detail-head .num{ font-size:42px; } .detail-head .nm{ font-size:30px; }
  .kpi .v{ font-size:28px; }
}
</style>
</head>
<body>
<div class="wrap">

  <header class="top">
    <div class="brand">
      <div class="logo"></div>
      <div>
        <h1><span class="c">CSIA</span> <span style="color:var(--dim);font-size:.6em;">×</span> <span class="l">LEADERS</span></h1>
        <div class="sub">School Baseball · Record Room</div>
      </div>
    </div>
    <div class="season-pill" id="seasonPill">2026 SEASON</div>
  </header>

  <nav class="tabs" id="tabs">
    <button data-view="games" class="active">경기 기록</button>
    <button data-view="hitters">타자 순위</button>
    <button data-view="pitchers">투수 순위</button>
    <button data-view="members">선수단</button>
  </nav>

  <!-- ============ GAMES ============ -->
  <section class="view active" id="view-games">
    <div class="section-title">경기 기록</div>
    <div class="kpi-row" id="gamesKpi"></div>
    <div class="grid games-grid" id="gamesGrid">
      <div class="loading"><div class="spinner"></div>경기 데이터를 불러오는 중…</div>
    </div>
  </section>

  <!-- ============ GAME DETAIL ============ -->
  <section class="view" id="view-gamedetail">
    <button class="back-btn" id="gdBack">← 경기 목록</button>
    <div id="gdContent"></div>
  </section>

  <!-- ============ HITTERS ============ -->
  <section class="view" id="view-hitters">
    <div class="section-title">타자 순위</div>
    <div class="mvp-banner" id="mvpBanner" style="display:none"></div>
    <div class="chips" id="hitterChips"></div>
    <div class="toolbar">
      <input class="search" id="hitterSearch" placeholder="선수 이름 검색…">
      <div class="seg" id="hitterTeamSeg">
        <button data-team="all" class="active">전체</button>
        <button data-team="CSIA">CSIA</button>
        <button data-team="Leaders">Leaders</button>
      </div>
    </div>
    <div class="panel"><div class="table-scroll"><table class="rec" id="hitterTable"></table></div></div>
  </section>

  <!-- ============ PITCHERS ============ -->
  <section class="view" id="view-pitchers">
    <div class="section-title">투수 순위</div>
    <div class="chips" id="pitcherChips"></div>
    <div class="toolbar">
      <input class="search" id="pitcherSearch" placeholder="선수 이름 검색…">
      <div class="seg" id="pitcherTeamSeg">
        <button data-team="all" class="active">전체</button>
        <button data-team="CSIA">CSIA</button>
        <button data-team="Leaders">Leaders</button>
      </div>
    </div>
    <div class="panel"><div class="table-scroll"><table class="rec" id="pitcherTable"></table></div></div>
  </section>

  <!-- ============ PLAYER DETAIL ============ -->
  <section class="view" id="view-playerdetail">
    <button class="back-btn" id="pdBack">← 돌아가기</button>
    <div id="pdContent"></div>
  </section>

  <!-- ============ MEMBERS ============ -->
  <section class="view" id="view-members">
    <div class="section-title">선수단</div>
    <div class="toolbar">
      <input class="search" id="memberSearch" placeholder="선수 이름 검색…">
      <div class="seg" id="memberTeamSeg">
        <button data-team="all" class="active">전체</button>
        <button data-team="CSIA">CSIA</button>
        <button data-team="Leaders">Leaders</button>
      </div>
    </div>
    <div class="grid games-grid" id="membersGrid"></div>
  </section>

  <footer id="footer">CSIA × LEADERS · 2026 · loading data source…</footer>
</div>

<script src="records.js"></script>
</body>
</html>
